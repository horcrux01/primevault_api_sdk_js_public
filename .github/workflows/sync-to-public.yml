name: Sync to public repo
on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name to create on public repo'
        required: true
      pr_title:
        description: 'PR title for the public repo'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create branch and PR on public repo
        env:
          GH_TOKEN: ${{ secrets.SDK_PRIVATE_PUBLIC_SYNC_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.event.inputs.branch_name }}"
          PR_TITLE="${{ github.event.inputs.pr_title }}"

          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config user.email "actions@github.com"
          git config user.name "github-actions"

          git remote add public https://github.com/horcrux01/primevault_api_sdk_js_public.git
          git fetch public main

          git checkout -b "$BRANCH_NAME" public/main
          git checkout main -- .
          git reset HEAD .github/workflows/
          git checkout -- .github/workflows/ || true
          git add -A
          git commit --quiet -m "$PR_TITLE" --allow-empty

          git push public "$BRANCH_NAME"

          gh pr create \
            --repo horcrux01/primevault_api_sdk_js_public \
            --base main \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body "Synced from private repo."
